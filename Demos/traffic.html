           //setup

           const roadHeight = 80;

           const METERS_PER_PIXEL = 0.1;       //  10 px = 1 m

           //Car Class with IDM
           class Car{
            constructor(x, y, speed, colour, speedgapwithleader=0, gap=1, acceleration = 0){ //all px/s with conversion scale above 
                this.x = x;
                this.y = y;
                this.speed = speed;
                // this.verticalspeed = 0;
                this.width = 20;
                this.height = 10;
                this.colour = colour;
                this.maxacc = 30;
                this.comfacc = 15; 
                this.safeacc = 20;
                this.timeheadway = 0; // in seconds (dt)
                this.desiredvel = 200; 
                this.mingap = 20;
                this.delta = 4;
                this.gap = gap;
                this.speedgapwithleader = speedgapwithleader;
                this.acceleration = acceleration;}
            update(dt){
                const desiredGap = this.mingap + this.speed * this.timeheadway + (this.speed * this.speedgapwithleader) / (2 * Math.sqrt(this.maxacc * this.comfacc));
                const gapRatio = desiredGap / this.gap;
                this.acceleration = this.maxacc * (1 - ((this.speed / this.desiredvel) ** this.delta) - (gapRatio ** 2));
                this.acceleration = Math.max(-this.maxacc, Math.min(this.acceleration, this.maxacc));
                this.x += (this.speed * dt);
                this.speed += (this.acceleration * dt);
                if (this.speed < 0) {
                    this.speed = 0;
                }
                }
             }

           ];
           //drawing canvas
           function drawStage(){
                //background
                ctx.fillStyle = "#556B2F"; //green
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                //roadbase
                ctx.fillStyle = "#3b3b3b";
                ctx.fillRect(0, roadY-(roadHeight/2), canvas.width, roadHeight);
                //dash
                const dashLength = 20;
                const dashGap = 15;
                const dashHeight = 6;
                ctx.fillStyle = "#FFFAF0";
                for (let x = 0; x < canvas.width; x += (dashLength + dashGap)){
                    ctx.fillRect(x, roadY - (dashHeight / 2), dashLength, dashHeight);
                };
                };
           //draw function for car
           function drawCar(car){
                ctx.fillStyle = car.colour;
                ctx.fillRect(car.x, car.y, car.width, car.height);
            };

            function wrapGap(leader, follower){
                if (!leader || !follower) {
                    return canvas.width - follower.width;
                }
                let gap = leader.x - follower.x - follower.width;
                if (gap < 0) gap += canvas.width;
                return Math.max(gap, 0.1);
            }

            function idmAcceleration(car, leader){
                const relSpeed = leader ? car.speed - leader.speed : 0;
                const desiredGap = car.mingap + car.speed * car.timeheadway +
                    (car.speed * relSpeed) / (2 * Math.sqrt(car.maxacc * car.comfacc));
                const gap = wrapGap(leader, car);
                const raw = car.maxacc * (1 - Math.pow(car.speed / car.desiredvel, car.delta) - Math.pow(desiredGap / gap, 2));
                return Math.max(-car.maxacc, Math.min(raw, car.maxacc));
            }

                for (let i = 0; i < cars.length; i++) {

                        groups[0].push(cars[i]);
                    } else {
                        groups[1].push(cars[i]);
